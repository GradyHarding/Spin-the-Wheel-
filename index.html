<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>LVT Game Hub</title>
<style>
/* ============================================================================
   1. CUSTOMIZATION LAYER  —  LVT STYLE GUIDE TOKENS
   ----------------------------------------------------------------------------
   This is the ONLY block you should need to touch to re-skin the entire hub.
   Drop in the official LVT Style Guide values and every component inherits
   them automatically. Nothing below this block hard-codes a color, font,
   radius, or timing value — it all references these variables.
   ========================================================================== */
:root {
  /* --- Background surfaces --------------------------------------------- */
  --bg-app:        #0e1420;   /* Full-page backdrop            */
  --bg-surface:    #17202f;   /* Cards / panels               */
  --bg-surface-2:  #1f2a3c;   /* Raised / pressed surfaces    */
  --bg-overlay:    rgba(8, 12, 20, 0.72); /* Scrim behind modals/bars */

  /* --- Brand colors ---------------------------------------------------- */
  --color-primary:      #1e6fff;   /* LVT primary brand blue   */
  --color-primary-dark: #1552c9;   /* Pressed / active state   */
  --color-accent:       #00d1b2;   /* Secondary accent         */
  --color-danger:       #ff4d5e;   /* Exit / destructive       */

  /* --- Text ------------------------------------------------------------ */
  --text-primary:   #f4f7fb;
  --text-secondary: #9fb0c7;
  --text-on-brand:  #ffffff;

  /* --- Typography ------------------------------------------------------ */
  --font-family-base:    "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-family-display: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-weight-regular: 400;
  --font-weight-bold:    700;

  /* Text scaling — bump --font-scale on large 4K kiosks without touching sizes */
  --font-scale:       1;
  --font-size-base:   calc(1rem   * var(--font-scale));
  --font-size-sm:     calc(0.875rem * var(--font-scale));
  --font-size-lg:     calc(1.25rem  * var(--font-scale));
  --font-size-title:  calc(2.25rem  * var(--font-scale));
  --font-size-hero:   calc(3rem     * var(--font-scale));

  /* --- Geometry -------------------------------------------------------- */
  --radius-sm:   10px;
  --radius-md:   18px;
  --radius-lg:   28px;
  --radius-pill: 999px;

  /* --- Spacing --------------------------------------------------------- */
  --space-xs: 8px;
  --space-sm: 16px;
  --space-md: 24px;
  --space-lg: 40px;
  --space-xl: 64px;

  /* --- Elevation ------------------------------------------------------- */
  --shadow-card:    0 10px 30px rgba(0, 0, 0, 0.35);
  --shadow-pressed: 0 4px 12px rgba(0, 0, 0, 0.45) inset;

  /* --- Touch-interaction transitions ----------------------------------- */
  --touch-press-scale:  0.96;   /* How far a card shrinks on tap        */
  --transition-fast:    120ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base:    240ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-view:    380ms cubic-bezier(0.16, 1, 0.3, 1);

  /* --- Layout ---------------------------------------------------------- */
  --card-min-width:  clamp(220px, 26vw, 340px);  /* Grid auto-fit floor  */
  --hub-max-width:   1400px;
}

/* ============================================================================
   BASE RESET  —  touch-first defaults
   ========================================================================== */
*,
*::before,
*::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;                 /* Kiosk: no scroll bounce */
  background: var(--bg-app);
  color: var(--text-primary);
  font-family: var(--font-family-base);
  font-size: var(--font-size-base);
}

/* Kill multi-touch text selection + iOS tap highlight across the whole kiosk */
body {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;       /* Removes 300ms tap delay + double-tap zoom */
  overscroll-behavior: none;
}

/* ============================================================================
   2. HUB INTERFACE
   ========================================================================== */
#hub {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: var(--space-xl) var(--space-lg) var(--space-lg);
  transition: opacity var(--transition-view), transform var(--transition-view);
  overflow-y: auto;                 /* Scroll only if the grid overflows */
  -webkit-overflow-scrolling: touch;
}

/* When a game is live, the hub slides/fades out behind the iframe */
body.game-active #hub {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

.hub__header {
  width: 100%;
  max-width: var(--hub-max-width);
  margin: 0 auto var(--space-lg);
  text-align: center;
}

.hub__title {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  font-size: var(--font-size-hero);
  letter-spacing: -0.02em;
  line-height: 1.05;
}

.hub__title span { color: var(--color-primary); }

.hub__subtitle {
  margin-top: var(--space-xs);
  color: var(--text-secondary);
  font-size: var(--font-size-lg);
}

/* --- Responsive game grid ------------------------------------------------- */
.hub__grid {
  width: 100%;
  max-width: var(--hub-max-width);
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(var(--card-min-width), 1fr));
  gap: var(--space-md);
  align-content: start;
}

/* --- Game card (rendered by JS) ------------------------------------------- */
.game-card {
  position: relative;
  display: flex;
  flex-direction: column;
  text-align: left;
  background: var(--bg-surface);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow-card);
  /* Touch transitions — see --touch-* / --transition-* tokens */
  transition: transform var(--transition-fast),
              box-shadow var(--transition-fast),
              border-color var(--transition-fast),
              background var(--transition-fast);
  -webkit-user-select: none;
  user-select: none;
  text-decoration: none;
  color: inherit;
  will-change: transform;
}

/* TOUCH FEEDBACK: use :active (tap) rather than :hover (mouse).
   :hover is included only as a courtesy for desktop testing. */
.game-card:active {
  transform: scale(var(--touch-press-scale));
  box-shadow: var(--shadow-pressed);
  border-color: var(--color-primary);
  background: var(--bg-surface-2);
}

@media (hover: hover) {
  .game-card:hover { border-color: var(--color-primary); }
}

.game-card__thumb {
  aspect-ratio: 16 / 10;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(4rem * var(--font-scale));
  /* Per-card accent is injected inline from the registry */
  background:
    radial-gradient(120% 120% at 50% 0%,
      var(--card-accent, var(--color-primary)) 0%,
      transparent 70%),
    var(--bg-surface-2);
}

.game-card__body {
  padding: var(--space-md);
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  flex: 1;
}

.game-card__title {
  font-family: var(--font-family-display);
  font-weight: var(--font-weight-bold);
  font-size: var(--font-size-title);
  line-height: 1.1;
}

.game-card__desc {
  color: var(--text-secondary);
  font-size: var(--font-size-base);
  line-height: 1.4;
}

.game-card__cta {
  margin-top: var(--space-sm);
  align-self: flex-start;
  padding: var(--space-xs) var(--space-md);
  border-radius: var(--radius-pill);
  background: var(--color-primary);
  color: var(--text-on-brand);
  font-weight: var(--font-weight-bold);
  font-size: var(--font-size-sm);
}

/* ============================================================================
   3. VIEWPORT ENGINE  —  full-bleed iframe + exit control
   ========================================================================== */
#viewport {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  height: 100dvh;                   /* Respect mobile browser chrome */
  border: 0;
  background: var(--bg-app);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-view);
  z-index: 10;
}

body.game-active #viewport {
  opacity: 1;
  pointer-events: auto;
}

/* Auto-hiding "Return to Hub" control.
   Persistent by default; add body.controls-hidden to fade it away and it
   reappears on the next screen tap (wired in JS). */
#exit-bar {
  position: fixed;
  top: var(--space-sm);
  left: var(--space-sm);
  z-index: 20;
  display: flex;
  gap: var(--space-sm);
  align-items: center;
  opacity: 0;
  transform: translateY(-12px);
  pointer-events: none;
  transition: opacity var(--transition-base), transform var(--transition-base);
}

body.game-active #exit-bar {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

body.game-active.controls-hidden #exit-bar {
  opacity: 0;
  transform: translateY(-12px);
  pointer-events: none;
}

.exit-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-sm) var(--space-md);
  border: 0;
  border-radius: var(--radius-pill);
  background: var(--color-danger);
  color: var(--text-on-brand);
  font-family: var(--font-family-base);
  font-weight: var(--font-weight-bold);
  font-size: var(--font-size-base);
  cursor: pointer;
  box-shadow: var(--shadow-card);
  backdrop-filter: blur(6px);
  transition: transform var(--transition-fast), background var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}

.exit-btn:active {
  transform: scale(var(--touch-press-scale));
  background: #d43a49;
}

.exit-btn__icon { font-size: var(--font-size-lg); line-height: 1; }

/* Small loading shimmer shown while an iframe boots */
#loader {
  position: fixed;
  inset: 0;
  z-index: 15;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--bg-app);
  color: var(--text-secondary);
  font-size: var(--font-size-lg);
}

body.game-loading #loader { display: flex; }

#loader .spinner {
  width: 48px; height: 48px;
  margin-right: var(--space-sm);
  border: 4px solid var(--bg-surface-2);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 800ms linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Respect users who ask for reduced motion */
@media (prefers-reduced-motion: reduce) {
  * { transition-duration: 1ms !important; animation-duration: 1ms !important; }
}
</style>
</head>
<body>

  <!-- ========================= HUB (LAUNCHER) ========================= -->
  <main id="hub">
    <header class="hub__header">
      <h1 class="hub__title">LVT <span>Game Hub</span></h1>
      <p class="hub__subtitle">Tap a game to play</p>
    </header>
    <!-- Grid is populated by the Dynamic Registry (see script below) -->
    <section class="hub__grid" id="game-grid" aria-label="Available games"></section>
  </main>

  <!-- ======================= VIEWPORT ENGINE ========================= -->
  <iframe id="viewport" title="Game viewport" allow="autoplay; fullscreen"></iframe>

  <div id="loader"><div class="spinner"></div>Loading game…</div>

  <div id="exit-bar">
    <button class="exit-btn" id="exit-btn" type="button">
      <span class="exit-btn__icon">←</span> Return to Hub
    </button>
  </div>

  <script>
  /* ==========================================================================
     4. DYNAMIC REGISTRY
     --------------------------------------------------------------------------
     Add a game by dropping ONE object into this array. The grid rebuilds
     itself — no HTML edits required. `path` is resolved relative to this file.
     ========================================================================= */
  const GAME_REGISTRY = [
    {
      id:        "prize-wheel",
      title:     "Prize Wheel",
      description: "Give it a spin and see what you win.",
      icon:      "🎡",                         // emoji, or swap for an <img> thumbnail
      thumbnail: null,                          // e.g. "games/prize-wheel/thumb.png"
      accent:    "#1e6fff",                     // per-card accent glow
      path:      "games/prize-wheel/index.html"
    },
    {
      id:        "plinko",
      title:     "Plinko",
      description: "Drop the chip and watch it fall.",
      icon:      "🎯",
      thumbnail: null,                          // e.g. "games/plinko/thumb.png"
      accent:    "#00d1b2",
      path:      "games/plinko/index.html"
    }
    // → Add future games here. That's the only change needed.
  ];

  /* ==========================================================================
     HUB CONTROLLER
     ========================================================================= */
  (function () {
    "use strict";

    const body     = document.body;
    const grid     = document.getElementById("game-grid");
    const viewport = document.getElementById("viewport");
    const exitBtn  = document.getElementById("exit-btn");

    /* ---- Render the grid from the registry ------------------------------ */
    function renderGrid() {
      const frag = document.createDocumentFragment();

      GAME_REGISTRY.forEach(function (game) {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "game-card";
        card.setAttribute("aria-label", "Play " + game.title);
        card.style.setProperty("--card-accent", game.accent || "var(--color-primary)");

        // Thumbnail: image if provided, otherwise emoji/icon
        const thumbInner = game.thumbnail
          ? '<img src="' + game.thumbnail + '" alt="" ' +
            'style="width:100%;height:100%;object-fit:cover" />'
          : (game.icon || "🎮");

        card.innerHTML =
          '<div class="game-card__thumb">' + thumbInner + '</div>' +
          '<div class="game-card__body">' +
            '<h2 class="game-card__title">' + game.title + '</h2>' +
            '<p class="game-card__desc">' + (game.description || "") + '</p>' +
            '<span class="game-card__cta">Play ▸</span>' +
          '</div>';

        card.addEventListener("click", function () { launchGame(game); });
        frag.appendChild(card);
      });

      grid.replaceChildren(frag);
    }

    /* ---- Launch a game into the viewport iframe ------------------------- */
    function launchGame(game) {
      body.classList.add("game-loading");

      // Reveal once the iframe reports it has loaded
      viewport.onload = function () {
        body.classList.remove("game-loading");
      };

      viewport.src = game.path;
      body.classList.add("game-active");
      scheduleControlsHide();
    }

    /* ---- Return to hub: fully unload the iframe ------------------------- */
    function exitGame() {
      body.classList.remove("game-active", "game-loading", "controls-hidden");
      clearTimeout(hideTimer);
      // Blank the src so the game stops running / releases resources
      viewport.src = "about:blank";
    }

    /* ---- Auto-hiding controls ------------------------------------------- */
    let hideTimer = null;
    const HIDE_AFTER_MS = 4000;

    function scheduleControlsHide() {
      clearTimeout(hideTimer);
      body.classList.remove("controls-hidden");
      hideTimer = setTimeout(function () {
        if (body.classList.contains("game-active")) {
          body.classList.add("controls-hidden");
        }
      }, HIDE_AFTER_MS);
    }

    // Any tap while a game is active re-shows the exit bar and restarts the timer
    document.addEventListener("pointerdown", function () {
      if (body.classList.contains("game-active")) scheduleControlsHide();
    });

    /* ---- Wire up + init ------------------------------------------------- */
    exitBtn.addEventListener("click", exitGame);

    // Optional: let a game request return via postMessage({type:"exit-game"})
    window.addEventListener("message", function (e) {
      if (e.data && e.data.type === "exit-game") exitGame();
    });

    // Deep-link support: index.html#plinko boots straight into a game
    function bootFromHash() {
      const id = (location.hash || "").replace("#", "");
      const match = GAME_REGISTRY.find(function (g) { return g.id === id; });
      if (match) launchGame(match);
    }

    renderGrid();
    bootFromHash();
  })();
  </script>
</body>
</html>
